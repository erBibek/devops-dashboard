services:
  # The "Security Guard"
  reverse-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"  # Nginx listens on port 80 now!
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web-app

  web-app:
    image: bibekiam/devops-dashboard:v2.1  # 1. Changed from :latest to :v2.1
    container_name: compose-custom-app
    restart: always
    environment:
      - REDIS_HOST=data-store               # 2. Points to the container name below
      - REDIS_PORT=6379
    depends_on:
      data-store:
        condition: service_healthy

  data-store:
    image: redis:alpine
    container_name: compose-db-app
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
services:
  # The new "Security Guard"
  reverse-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web-app

  web-app:
    image: bibekiam/devops-dashboard:latest
    container_name: compose-custom-app
    # We no longer need to map ports here, Nginx handles that!
    restart: always
    depends_on:
      data-store:
        condition: service_healthy

  data-store:
    image: redis:alpine
    container_name: compose-db-app
    restart: always
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
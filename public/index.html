<div style="margin-top: 30px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 8px; display: inline-block;">
    <h3 style="margin: 0; color: #4ade80;">🚀 Live Architecture Metrics</h3>
    <p style="margin: 5px 0 0 0; font-size: 1.1rem;">
      Total Container Hits: <span id="counter" style="font-weight: bold; color: #38bdf8;">Loading...</span>
    </p>
  </div>

  <script>
    // Asynchronously pull counter values directly from our API layer
    async function updateCounter() {
      try {
        const response = await fetch('/api/visitors');
        const data = await response.json();
        document.getElementById('counter').textContent = data.count;
      } catch (err) {
        document.getElementById('counter').textContent = "Database Offline";
      }
    }
    // Execute count function on layout load
    updateCounter();
  </script>
